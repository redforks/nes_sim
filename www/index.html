<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hello wasm-pack!</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111827;
        font-family: Arial, sans-serif;
        position: relative;
      }

      #play-button {
        position: relative;
        z-index: 2;
        font-size: 48px;
        font-weight: 700;
        padding: 28px 72px;
        border: 0;
        border-radius: 18px;
        background: #f59e0b;
        color: #111827;
        cursor: pointer;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      }

      #play-button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      #canvas {
        position: fixed;
        inset: 0;
        margin: auto;
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <button id="play-button" type="button">Play</button>
    <script src="./bootstrap.js"></script>
    <canvas id="canvas" width="256" height="240" style="zoom: 400%"></canvas>
  </body>
</html>
